<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARC Protocol — Cryptographic Agent Accountability</title>
  <meta name="description" content="ARC: A two-phase cryptographic receipt protocol for verifiable AI agent execution. Proof of execution, tamper-evident logs, signed rollback." />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #1a1714;
      color: #ede8e2;
      font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.65;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #1a1714; }
    ::-webkit-scrollbar-thumb { background: #4a3f3a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #9b8880; }

    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 1;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 8px rgba(217,119,87,0.3); }
      50%       { box-shadow: 0 0 22px rgba(217,119,87,0.7); }
    }
    @keyframes typeIn {
      from { width: 0; }
      to   { width: 100%; }
    }
    @keyframes blink-cursor {
      50% { border-color: transparent; }
    }
    @keyframes chainPulse {
      0%, 100% { stroke-opacity: 0.25; }
      50%       { stroke-opacity: 0.9; }
    }
    @keyframes nodePulse {
      0%, 100% { r: 9; }
      50%       { r: 11; }
    }
    @keyframes receiptSlide {
      0%   { opacity: 0; transform: translateY(6px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-8px); }
    }

    a { color: inherit; text-decoration: none; }
  </style>
</head>
<body>

  <!-- Canvas particle background -->
  <canvas id="bg-canvas"></canvas>

  <div id="root"></div>

  <!-- Dot matrix grid — reactive to mouse hover -->
  <script>
  (function() {
    const canvas = document.getElementById('bg-canvas');
    const ctx    = canvas.getContext('2d');

    const SPACING      = 28;    // grid gap in px
    const BASE_R       = 1.1;   // resting dot radius
    const INFLUENCE_R  = 100;   // mouse effect radius
    const MAX_PUSH     = 12;    // max displacement
    const BASE_ALPHA   = 0.07;  // resting dot opacity — very subtle
    const LERP         = 0.08;  // mouse smoothing factor

    let W, H;
    let target = { x: -9999, y: -9999 };
    let mouse  = { x: -9999, y: -9999 };

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function draw() {
      // Smooth mouse
      mouse.x += (target.x - mouse.x) * LERP;
      mouse.y += (target.y - mouse.y) * LERP;

      ctx.clearRect(0, 0, W, H);

      const cols = Math.ceil(W / SPACING) + 2;
      const rows = Math.ceil(H / SPACING) + 2;

      for (let i = 0; i < cols; i++) {
        for (let j = 0; j < rows; j++) {
          const bx = i * SPACING;
          const by = j * SPACING;

          const dx   = mouse.x - bx;
          const dy   = mouse.y - by;
          const dist = Math.sqrt(dx * dx + dy * dy);

          let x = bx, y = by, r = BASE_R, a = BASE_ALPHA;

          if (dist < INFLUENCE_R && dist > 0) {
            const t     = 1 - dist / INFLUENCE_R;          // 0→1 as dist→0
            const ease  = t * t * (3 - 2 * t);             // smoothstep
            const angle = Math.atan2(dy, dx);
            x = bx - Math.cos(angle) * ease * MAX_PUSH;
            y = by - Math.sin(angle) * ease * MAX_PUSH;
            r = BASE_R + ease * 1.4;
            a = BASE_ALPHA + ease * 0.22;
          }

          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(217,119,87,${a})`;
          ctx.fill();
        }
      }

      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', e => { target.x = e.clientX; target.y = e.clientY; });
    window.addEventListener('mouseleave', () => { target.x = -9999; target.y = -9999; });

    resize();
    draw();
  })();
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const C = {
      bg:          "#1a1714",
      low:         "#231f1c",
      mid:         "#2c2825",
      high:        "#38332f",
      highest:     "#443f3a",
      accent:      "#d97757",
      accentDim:   "#b5614a",
      accentGlow:  "rgba(217,119,87,0.12)",
      accentGlow2: "rgba(217,119,87,0.06)",
      green:       "#7ec984",
      greenDim:    "#5a9c60",
      red:         "#ffb4ab",
      amber:       "#ffb300",
      text:        "#ede8e2",
      textDim:     "#c4b7ae",
      textBright:  "#f5f0ea",
      outline:     "#9b8880",
      outlineV:    "#4a3f3a",
      mono: "'IBM Plex Mono', 'Courier New', monospace",
      sans: "'IBM Plex Sans', 'Segoe UI', sans-serif",
    };

    const REPO    = "https://github.com/RamachandraKulkarni/arc-protocol";
    const PDF_URL = "https://arc-protocol-site.vercel.app/arc_paper.pdf";

    const PROVENANCE = Object.freeze({
      RESEARCH_INCEPTION: "2026-03-01T00:00:00.000Z",
      PAPER_CREATED:      "2026-04-02T00:00:00.000Z",
      PROTOCOL_VERSION:   "v1.1",
      PUBLICATION_STATUS: "Unpublished Preprint",
    });

    /* ─── Merkle tree decoration (hero) ─── */
    function MerkleLive({ size = 200 }) {
      const [tick, setTick] = useState(0);
      useEffect(() => {
        const id = setInterval(() => setTick(t => t + 1), 900);
        return () => clearInterval(id);
      }, []);
      const nodes = [
        { id: "root", x: 100, y: 16, label: "root" },
        { id: "n1", x: 52,  y: 72, label: "n1" },
        { id: "n2", x: 148, y: 72, label: "n2" },
        { id: "l1", x: 26,  y: 130, label: "L1" },
        { id: "l2", x: 78,  y: 130, label: "L2" },
        { id: "l3", x: 122, y: 130, label: "L3" },
        { id: "l4", x: 174, y: 130, label: "L4" },
      ];
      const edges = [["root","n1"],["root","n2"],["n1","l1"],["n1","l2"],["n2","l3"],["n2","l4"]];
      const activeEdge = tick % edges.length;
      return (
        <svg width={size} height={size * 0.8} viewBox="0 0 200 160">
          {edges.map(([a, b], i) => {
            const na = nodes.find(n => n.id === a);
            const nb = nodes.find(n => n.id === b);
            const isActive = i === activeEdge;
            return (
              <line key={i} x1={na.x} y1={na.y} x2={nb.x} y2={nb.y}
                stroke={isActive ? C.green : C.accent}
                strokeWidth={isActive ? 2 : 1.2}
                opacity={isActive ? 0.9 : 0.22}
                style={{ transition: "all 0.4s ease" }} />
            );
          })}
          {nodes.map((n, i) => {
            const isRoot = n.id === "root";
            return (
              <g key={n.id}>
                <circle cx={n.x} cy={n.y} r={isRoot ? 11 : 8}
                  fill={C.bg}
                  stroke={isRoot ? C.green : C.accent}
                  strokeWidth={isRoot ? 2 : 1.5}
                  opacity={0.85} />
                <text x={n.x} y={n.y + 4} textAnchor="middle"
                  fill={isRoot ? C.green : C.accent}
                  fontSize={isRoot ? 7 : 6.5}
                  fontFamily={C.mono}>{n.label}</text>
              </g>
            );
          })}
        </svg>
      );
    }

    /* ─── Live receipt building animation ─── */
    function LiveReceiptCard() {
      const PHASES = [
        { label: "DECLARING INTENT", color: C.accent, lines: [
          { k: "intent_id",      v: "intent_01JTXM9KP3..." },
          { k: "tool_name",      v: "\"delete_directory\"" },
          { k: "declared_at",    v: "2026-04-03T18:22:01Z" },
          { k: "reasoning",      v: "sha256:a3f9c1..." },
        ]},
        { label: "CAPTURING BEFORE-STATE", color: C.amber, lines: [
          { k: "snapshot_ref",   v: "snap_01JTXM9KP4..." },
          { k: "snapshot_hash",  v: "sha256:d7b2e9..." },
          { k: "resource_type",  v: "\"filesystem:directory\"" },
          { k: "is_reversible",  v: "true" },
        ]},
        { label: "COMMITTING TO LOG", color: C.accent, lines: [
          { k: "sequence_number", v: "42" },
          { k: "merkle_root",     v: "sha256:f1a3c8..." },
          { k: "committed_at",    v: "2026-04-03T18:22:02Z" },
        ]},
        { label: "PROVIDER SIGNING", color: C.green, lines: [
          { k: "outcome",         v: "\"success\"" },
          { k: "outcome_hash",    v: "sha256:8b4e21..." },
          { k: "signature",       v: "ed25519:Kp3f9A..." },
          { k: "signed_at",       v: "2026-04-03T18:22:03Z" },
        ]},
        { label: "RECEIPT VERIFIED ✓", color: C.green, lines: [
          { k: "receipt_id",      v: "arc_01JTXM9KP5..." },
          { k: "valid",           v: "true" },
          { k: "provider_sig",    v: "✓ verified" },
          { k: "rollback",        v: "available until +60min" },
        ]},
      ];

      const [phase, setPhase]     = useState(0);
      const [lineIdx, setLineIdx] = useState(0);
      const [visible, setVisible] = useState([]);

      useEffect(() => {
        const current = PHASES[phase];
        if (lineIdx < current.lines.length) {
          const t = setTimeout(() => {
            setVisible(v => [...v, current.lines[lineIdx]]);
            setLineIdx(i => i + 1);
          }, 340);
          return () => clearTimeout(t);
        } else {
          const t = setTimeout(() => {
            if (phase < PHASES.length - 1) {
              setPhase(p => p + 1);
              setLineIdx(0);
              setVisible([]);
            } else {
              const t2 = setTimeout(() => {
                setPhase(0); setLineIdx(0); setVisible([]);
              }, 2800);
              return () => clearTimeout(t2);
            }
          }, 900);
          return () => clearTimeout(t);
        }
      }, [phase, lineIdx]);

      const current = PHASES[phase];
      const isDone  = phase === PHASES.length - 1;

      return (
        <div style={{
          background: C.low,
          border: `1px solid ${isDone ? C.greenDim : C.outlineV}`,
          borderRadius: "10px",
          padding: "20px",
          fontFamily: C.mono,
          fontSize: "12px",
          minHeight: "210px",
          width: "340px",
          maxWidth: "100%",
          transition: "border-color 0.5s ease",
          boxShadow: isDone ? `0 0 24px rgba(126,201,132,0.15)` : `0 0 16px rgba(0,0,0,0.3)`,
          animation: "float 4s ease-in-out infinite",
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "14px" }}>
            <span style={{
              color: current.color, fontWeight: 700, fontSize: "11px", letterSpacing: "0.08em",
              transition: "color 0.3s ease",
            }}>{current.label}</span>
            <span style={{
              display: "flex", gap: "5px", alignItems: "center",
            }}>
              {PHASES.map((_, i) => (
                <span key={i} style={{
                  width: "6px", height: "6px", borderRadius: "50%",
                  background: i <= phase ? C.accent : C.outlineV,
                  transition: "background 0.3s ease",
                }} />
              ))}
            </span>
          </div>
          <div style={{ minHeight: "130px" }}>
            {visible.map((line, i) => (
              <div key={i} style={{
                display: "flex", gap: "8px", marginBottom: "7px",
                animation: "receiptSlide 0.25s ease forwards",
              }}>
                <span style={{ color: C.textDim, minWidth: "100px", fontSize: "11px" }}>{line.k}:</span>
                <span style={{ color: C.textBright, fontSize: "11px", wordBreak: "break-all" }}>{line.v}</span>
              </div>
            ))}
            {lineIdx < current.lines.length && (
              <div style={{ display: "flex", gap: "8px", marginTop: "4px" }}>
                <span style={{ color: C.accent, fontSize: "11px" }}>▍</span>
              </div>
            )}
          </div>
          {isDone && (
            <div style={{
              borderTop: `1px solid ${C.greenDim}`,
              paddingTop: "10px", marginTop: "6px",
              display: "flex", alignItems: "center", gap: "8px",
            }}>
              <div style={{
                width: "8px", height: "8px", borderRadius: "50%",
                background: C.green, boxShadow: `0 0 10px ${C.green}`,
                animation: "pulse 1.5s ease infinite",
              }} />
              <span style={{ color: C.green, fontWeight: 700, fontSize: "11px", letterSpacing: "0.08em" }}>
                CRYPTOGRAPHIC PROOF COMPLETE
              </span>
            </div>
          )}
        </div>
      );
    }

    /* ─── Receipt verification card ─── */
    function ReceiptCard({ receipt, index }) {
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const t = setTimeout(() => setVisible(true), index * 130);
        return () => clearTimeout(t);
      }, [index]);
      return (
        <div style={{
          opacity: visible ? 1 : 0,
          transform: visible ? "translateY(0)" : "translateY(14px)",
          transition: "all 0.45s ease",
          background: C.low, border: `1px solid ${C.outlineV}`,
          borderRadius: "8px", padding: "16px",
          fontFamily: C.mono, fontSize: "12px",
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "8px" }}>
            <span style={{ color: C.accent, fontWeight: 600 }}>{receipt.id}</span>
            <span style={{
              color: C.green, fontSize: "11px",
              background: "rgba(126,201,132,0.1)",
              padding: "2px 8px", borderRadius: "3px",
            }}>VALID</span>
          </div>
          <div style={{ color: C.textDim, fontSize: "11px", marginBottom: "8px" }}>{receipt.command}</div>
          <div style={{ display: "flex", gap: "16px" }}>
            <span style={{ color: C.textDim, fontSize: "10px" }}>
              intent seq: <span style={{ color: C.text }}>{receipt.intentSeq}</span>
            </span>
            <span style={{ color: C.textDim, fontSize: "10px" }}>
              receipt seq: <span style={{ color: C.text }}>{receipt.receiptSeq}</span>
            </span>
          </div>
        </div>
      );
    }

    /* ─── Attack table row ─── */
    function AttackRow({ attack }) {
      const [hovered, setHovered] = useState(false);
      return (
        <tr onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}
          style={{ background: hovered ? C.mid : "transparent", transition: "background 0.18s" }}>
          <td style={{ padding: "10px 14px", color: C.text, fontSize: "13px" }}>{attack.name}</td>
          <td style={{ padding: "10px 14px", textAlign: "center" }}>
            <span style={{ color: attack.v10 === "Caught" ? C.green : C.red, fontFamily: C.mono, fontSize: "12px", fontWeight: 600 }}>
              {attack.v10}
            </span>
          </td>
          <td style={{ padding: "10px 14px", textAlign: "center" }}>
            <span style={{ color: C.green, fontFamily: C.mono, fontSize: "12px", fontWeight: 600 }}>{attack.v11}</span>
          </td>
        </tr>
      );
    }

    /* ─── Test file row ─── */
    function TestFileRow({ test }) {
      const [hovered, setHovered] = useState(false);
      return (
        <tr onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}
          style={{ background: hovered ? C.mid : "transparent", transition: "background 0.18s", borderBottom: `1px solid ${C.outlineV}` }}>
          <td style={{ padding: "10px 14px" }}>
            <a href={`${REPO}/blob/master/tests/red_team/${test.file}`}
              target="_blank" rel="noreferrer"
              style={{ color: C.accent, fontFamily: C.mono, fontSize: "12px" }}>
              {test.file}
            </a>
          </td>
          <td style={{ padding: "10px 14px", color: C.text, fontSize: "13px" }}>{test.name}</td>
          <td style={{ padding: "10px 14px", fontSize: "12px", color: C.textDim, maxWidth: "300px" }}>{test.desc}</td>
          <td style={{ padding: "10px 14px", textAlign: "center" }}>
            <span style={{ color: C.green, fontFamily: C.mono, fontSize: "12px", fontWeight: 600 }}>{test.count}</span>
          </td>
        </tr>
      );
    }

    /* ─── Provenance timer ─── */
    function ProvenanceTimer() {
      const [elapsed, setElapsed]           = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });
      const [researchElapsed, setResearch]  = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });

      useEffect(() => {
        const calc = (from) => {
          const diff = Math.max(0, Date.now() - new Date(from).getTime());
          const s    = Math.floor(diff / 1000);
          return { days: Math.floor(s / 86400), hours: Math.floor((s % 86400) / 3600), minutes: Math.floor((s % 3600) / 60), seconds: s % 60 };
        };
        const tick = () => {
          setElapsed(calc(PROVENANCE.PAPER_CREATED));
          setResearch(calc(PROVENANCE.RESEARCH_INCEPTION));
        };
        tick();
        const id = setInterval(tick, 1000);
        return () => clearInterval(id);
      }, []);

      const pad = n => String(n).padStart(2, "0");

      const TimeBlock = ({ value, label }) => (
        <div style={{ textAlign: "center", minWidth: "52px" }}>
          <div style={{
            fontFamily: C.mono, fontSize: "22px", fontWeight: 700, color: C.accent,
            background: C.bg, border: `1px solid ${C.outlineV}`,
            borderRadius: "4px", padding: "5px 10px", lineHeight: 1,
          }}>{pad(value)}</div>
          <div style={{ fontFamily: C.mono, fontSize: "9px", color: C.textDim, marginTop: "4px", letterSpacing: "0.1em", textTransform: "uppercase" }}>
            {label}
          </div>
        </div>
      );

      return (
        <div style={{ background: C.low, border: `1px solid ${C.outlineV}`, borderRadius: "10px", padding: "28px", marginTop: "36px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "20px" }}>
            <div style={{ width: "8px", height: "8px", borderRadius: "50%", background: C.green, boxShadow: `0 0 8px ${C.green}`, animation: "pulse 2s ease infinite" }} />
            <span style={{ fontFamily: C.mono, fontSize: "12px", fontWeight: 700, color: C.textBright, letterSpacing: "0.1em" }}>
              DOCUMENT PROVENANCE (IMMUTABLE)
            </span>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "16px", marginBottom: "24px" }}>
            {[
              { label: "RESEARCH INCEPTION", date: "March 01, 2026", time: "00:00:00 UTC" },
              { label: "PAPER CREATED",      date: "April 02, 2026", time: "00:00:00 UTC" },
            ].map((item, i) => (
              <div key={i} style={{ background: C.bg, borderRadius: "6px", padding: "14px", border: `1px solid ${C.outlineV}` }}>
                <div style={{ fontFamily: C.mono, fontSize: "10px", color: C.textDim, letterSpacing: "0.08em", marginBottom: "6px" }}>{item.label}</div>
                <div style={{ fontFamily: C.mono, fontSize: "15px", color: C.textBright, fontWeight: 600 }}>{item.date}</div>
                <div style={{ fontFamily: C.mono, fontSize: "11px", color: C.accentDim, marginTop: "4px" }}>{item.time}</div>
              </div>
            ))}
          </div>
          {[
            { label: "TIME SINCE PAPER CREATION",     data: elapsed },
            { label: "TIME SINCE RESEARCH INCEPTION",  data: researchElapsed },
          ].map((section, i) => (
            <div key={i} style={{ marginBottom: i === 0 ? "20px" : "0" }}>
              <div style={{ fontFamily: C.mono, fontSize: "10px", color: C.textDim, letterSpacing: "0.08em", marginBottom: "10px" }}>
                {section.label}
              </div>
              <div style={{ display: "flex", gap: "8px", alignItems: "flex-start" }}>
                <TimeBlock value={section.data.days}    label="days" />
                <span style={{ fontFamily: C.mono, fontSize: "22px", color: C.outlineV, lineHeight: "34px" }}>:</span>
                <TimeBlock value={section.data.hours}   label="hours" />
                <span style={{ fontFamily: C.mono, fontSize: "22px", color: C.outlineV, lineHeight: "34px" }}>:</span>
                <TimeBlock value={section.data.minutes} label="mins" />
                <span style={{ fontFamily: C.mono, fontSize: "22px", color: C.outlineV, lineHeight: "34px" }}>:</span>
                <TimeBlock value={section.data.seconds} label="secs" />
              </div>
            </div>
          ))}
          <div style={{ display: "flex", gap: "16px", flexWrap: "wrap", borderTop: `1px solid ${C.outlineV}`, paddingTop: "14px", marginTop: "14px" }}>
            {[
              { k: "Protocol", v: PROVENANCE.PROTOCOL_VERSION },
              { k: "Status",   v: PROVENANCE.PUBLICATION_STATUS, color: C.amber },
              { k: "Tests",    v: "58/58 passing" },
            ].map(({ k, v, color }, i) => (
              <div key={i} style={{ fontFamily: C.mono, fontSize: "11px" }}>
                <span style={{ color: C.textDim }}>{k}: </span>
                <span style={{ color: color || C.text, fontWeight: 600 }}>{v}</span>
              </div>
            ))}

    /* ─── App ─── */
    function App() {
      const [activeNav, setActiveNav] = useState("overview");

      const handleNav = (section) => {
        setActiveNav(section);
        const el = document.getElementById(section);
        if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
      };

      useEffect(() => {
        const sections = ["overview", "protocol", "security", "tests", "proof", "paper"];
        const observer = new IntersectionObserver(
          (entries) => { entries.forEach(entry => { if (entry.isIntersecting) setActiveNav(entry.target.id); }); },
          { rootMargin: "-40% 0px -40% 0px" }
        );
        sections.forEach(id => { const el = document.getElementById(id); if (el) observer.observe(el); });
        return () => observer.disconnect();
      }, []);

      return (
        <div style={{ minHeight: "100vh", position: "relative" }}>
          <Nav active={activeNav} onNav={handleNav} />
          <main style={{ position: "relative", zIndex: 1 }}>
            <Hero onNav={handleNav} />
            <Protocol />
            <Security />
            <RedTeamTests />
            <Proof />
            <Paper />
          </main>
          <Footer />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
